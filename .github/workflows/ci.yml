name: CI

on:
  push:
    branches: [main, feat/production-hardening]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest test/ -v --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 script/trust_score/pupil_dilation.py api/index.py --max-line-length=150 --ignore=E128,E131,E221,E302,E305,E402,E501,W503,W504 --count --show-source --statistics
